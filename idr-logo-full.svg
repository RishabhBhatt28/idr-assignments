<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" width="340" height="80">
  <defs>
    <linearGradient id="faceGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E85000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sideGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C03D00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A83300;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Cube icon -->
  <polygon points="40,8 68,24 40,40 12,24" fill="url(#faceGrad2)"/>
  <polygon points="12,24 40,40 40,64 12,48" fill="#1A1A1A"/>
  <polygon points="68,24 40,40 40,64 68,48" fill="url(#sideGrad2)"/>
  <line x1="40" y1="18" x2="40" y2="36" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <circle cx="40" cy="39" r="1.5" fill="white" opacity="0.9"/>

  <!-- IDR wordmark -->
  <text x="86" y="32" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" letter-spacing="3" fill="#1A1A1A">IDR</text>

  <!-- Divider -->
  <rect x="86" y="39" width="120" height="1.5" fill="#FF6B00"/>

  <!-- Full name -->
  <text x="87" y="56" font-family="'Trebuchet MS', Arial, sans-serif" font-size="10.5" letter-spacing="1.8" fill="#1A1A1A">INSTITUTE OF DIGITAL RISK</text>
</svg>
