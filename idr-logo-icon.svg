<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="faceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E85000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sideGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C03D00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A83300;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Isometric cube - top face -->
  <polygon points="40,8 68,24 40,40 12,24" fill="url(#faceGrad)"/>
  <!-- Cube left face -->
  <polygon points="12,24 40,40 40,64 12,48" fill="#1A1A1A"/>
  <!-- Cube right face -->
  <polygon points="68,24 40,40 40,64 68,48" fill="url(#sideGrad)"/>
  <!-- Shield / alert overlay - white diagonal slash suggesting risk/alert -->
  <line x1="40" y1="18" x2="40" y2="36" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <circle cx="40" cy="39" r="1.5" fill="white" opacity="0.9"/>
</svg>
